<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">

            <div class="flex-shrink-0 flex items-center">
                <a href="#" class="text-2xl font-bold text-primary">Result-Viewer</a>
            </div>

            <div class="hidden md:flex space-x-8 items-center">
                <a th:href="@{'/'}" class="text-primary font-medium transition">Home</a>
                <a th:href="@{'/view-result'}"  class="text-slate-600 hover:text-primary font-medium transition">View Result</a>
                <a th:href="@{'/admin/add-result'}" class="text-slate-600 hover:text-primary font-medium transition">Add Result</a>
                <a th:href="@{'/help'}" class="text-slate-600 hover:text-primary font-medium transition">Help</a>

                <a href="#action" class="bg-primary hover:bg-primaryHover text-white px-5 py-2 rounded-lg font-medium transition shadow-sm ml-4">Login</a>
            </div>

            <div class="md:hidden flex items-center">
                <button id="mobile-menu-btn" class="text-slate-600 hover:text-primary focus:outline-none p-2">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 shadow-xl absolute w-full left-0">
        <div class="px-4 pt-2 pb-6 space-y-1">
            <a th:href="@{'/'}" class="block px-3 py-3 rounded-md text-base font-medium text-primary bg-blue-50 transition">Home</a>
            <a th:href="@{'/view-result'}"  class="block px-3 py-3 rounded-md text-base font-medium text-slate-700 hover:text-primary hover:bg-blue-50 transition">View Result</a>
            <a th:href="@{'/admin/add-result'}" class="block px-3 py-3 rounded-md text-base font-medium text-slate-700 hover:text-primary hover:bg-blue-50 transition">Add Result</a>
            <a th:href="@{'/help'}" class="block px-3 py-3 rounded-md text-base font-medium text-slate-700 hover:text-primary hover:bg-blue-50 transition">Help</a>

            <div class="pt-4 px-3">
                <a href="#action" class="block w-full text-center bg-primary hover:bg-primaryHover text-white px-5 py-3 rounded-lg font-medium transition shadow-sm">Login</a>
            </div>
        </div>
    </div>
</nav>
<div class="lg:w-2/3 w-full  py-10 border shadow px-5 mt-3 rounded mx-auto">
    <h1 class="text-3xl text-center font-bold text-gray-700">Add result form</h1>
    <p class="mt-2 text-gray-500 text-center">Add student result to database...</p>
    <form th:action="@{'/admin/add-result-action'}" th:object="${studentForm}" method="post" enctype="multipart/form-data">
        <div>
            <label for="student_name" class="block mb-2.5 text-sm font-medium text-heading">Student name</label>
            <input type="text" id="student_name"
                   th:field="*{name}"
                   class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter student name"
                   required />
            <span class="text-red-700" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <div>
            <label for="rollNumber" class="block mb-2.5 text-sm font-medium text-heading">Roll Number</label>
            <input type="text" id="rollNumber"
                   th:field="*{rollNumber}"
                   class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                   placeholder="Enter your rollNumber"
                   required />
            <span class="text-red-700" th:if="${#fields.hasErrors('rollNumber')}"
                  th:errors="*{rollNumber}"></span>
        </div>

        <div class="mt-5">
            <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Email</label>
            <input type="email" id="email"
                   th:field="*{email}"
                   class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                   placeholder="Enter your email"
                   required />
            <span class="text-red-700" th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"></span>
        </div>

        <div class="mt-5">
            <label for="address" class="block mb-2.5 text-sm font-medium text-heading">Address</label>
            <textarea id="address"
                   th:field="*{address}"
                   class="bg-neutral-secondary-medium h-24 border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                   placeholder="Enter your address"
                      required ></textarea>
            <span class="text-red-700" th:if="${#fields.hasErrors('address')}"
                  th:errors="*{address}"></span>
        </div>

        <div class="mt-5">
            <label for="schoolName" class="block mb-2.5 text-sm font-medium text-heading">School Name</label>
            <input type="text" id="schoolName"
                   th:field="*{schoolName}"
                   class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                   placeholder="Enter your school name"
                   required />
            <span class="text-red-700" th:if="${#fields.hasErrors('schoolName')}"
                  th:errors="*{schoolName}"></span>
        </div>

        <div class="mt-5">
            <label for="dateOfBirth" class="block mb-2.5 text-sm font-medium text-heading">Date Of Birth</label>
            <input type="date" id="dateOfBirth"
                   th:field="*{dateOfBirth}"
                   class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                   placeholder="Enter your DOB"
                   required />
            <span class="text-red-700" th:if="${#fields.hasErrors('dateOfBirth')}"
                  th:errors="*{dateOfBirth}"></span>
        </div>

        <div class="mt-5">
            <label for="standard" class="block mb-2.5 text-sm font-medium text-heading">Standard</label>
            <select class="w-full" id="standard" th:field="*{standard}">
                <option th:each="standard: ${standardOptions}" th:value="${standard}"  th:text="${standard}"></option>
            </select>
        </div>

        <div class="mt-5">
            <label for="fatherName" class="block mb-2.5 text-sm font-medium text-heading">Father name</label>
            <input type="text" id="fatherName"
                   th:field="*{fatherName}"
                   class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                   placeholder="Enter your father name"
                   required />
            <span class="text-red-700" th:if="${#fields.hasErrors('fatherName')}"
                  th:errors="*{fatherName}"></span>
        </div>

        <div class="mt-5">
            <label class="block mb-2.5 text-sm font-medium text-heading">Select gender</label>

            <div class="flex items-center mb-4">
                <input id="default-radio-1" type="radio" th:field="*{gender}" th:value="male" class="w-4 h-4 text-neutral-primary border-default-medium bg-neutral-secondary-medium rounded-full checked:border-brand focus:ring-2 focus:outline-none focus:ring-brand-subtle border border-default">
                <label for="default-radio-1" class=" ms-2 text-sm font-medium text-gray-900">Male</label>
            </div>
            <div class="flex items-center">
                <input id="default-radio-2" type="radio" th:field="*{gender}" th:value="female"  class="w-4 h-4 text-neutral-primary border-default-medium bg-neutral-secondary-medium rounded-full checked:border-brand focus:ring-2 focus:outline-none focus:ring-brand-subtle border border-default">
                <label for="default-radio-2" class="ms-2 text-sm font-medium text-gray-900">Female</label>
            </div>

            <span class="text-red-700" th:if="${#fields.hasErrors('gender')}"
                  th:errors="*{gender}"></span>

        </div>
        <div>

            <div class="mt-5" id="marks_container">
                <div class="flex gap-4 border rounded px-3 py-4">
                    <div class="flex flex-col">
                        <label>Subject</label>
                        <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter subject"/>
                    </div>
                    <div class="flex flex-col">
                        <label>Marks</label>
                        <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter marks"/>
                    </div>
                    <div class="flex flex-col">
                        <label>Grade</label>
                        <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter Grade"/>
                    </div>
                    <div class="flex flex-col">
                        <label>Feedback</label>
                        <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter feedback"/>
                    </div>
                </div>

            </div>


            <div class="flex justify-center my-4">
                <button onclick="addMarksRow()" type="button" class="text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5">Add subject marks</button>

            </div>
        </div>



        <div class="mt-4 flex justify-center">
            <button type="submit" class="text-black bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 ">Add result</button>
            <button type="button" class="text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5">clear</button>

        </div>

    </form>
</div>
<script>
    function addMarksRow() {
        const container = document.getElementById("marks_container");

        // Wrap the HTML inside backticks (`) to make it a valid multi-line string
        const newRowHTML = `
            <div class="flex gap-4 border rounded px-3 py-4 mt-4">
                <div class="flex flex-col">
                    <label>Subject</label>
                    <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter subject"/>
                </div>
                <div class="flex flex-col">
                    <label>Marks</label>
                    <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter marks"/>
                </div>
                <div class="flex flex-col">
                    <label>Grade</label>
                    <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter Grade"/>
                </div>
                <div class="flex flex-col">
                    <label>Feedback</label>
                    <input class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" type="text" placeholder="Enter feedback"/>
                </div>
            </div>
        `;

        // Use insertAdjacentHTML instead of innerHTML += to prevent wiping out data already typed in previous rows!
        container.insertAdjacentHTML('beforeend', newRowHTML);
    }
</script>
</body>
</html>
